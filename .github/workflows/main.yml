name: Build Offline Android Debug APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. جلب كود المشروع من مستودع GitHub
        uses: actions/checkout@v4

      - name: 2. إعداد بيئة Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 3. إنشاء ملف google-services.json وهمي لمنع أخطاء البناء
        run: |
          echo "جاري تجهيز المجلدات وإنشاء ملفات التكلفة الوهمية لخدمات غوغل..."
          find . -type d -name "app" | while read app_dir; do
            cat <<EOF > "$app_dir/google-services.json"
          {
            "project_info": { "project_number": "000000000000", "project_id": "offline-app" },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000000",
                  "android_client_info": { "package_name": "com.aistudio.smartcashierpos.offlinepos" }
                }
              }
            ]
          }
          EOF
          done

      - name: 4. تحديد موقع المشروع وإعداد الـ Wrapper والبناء
        run: |
          # 1. البحث عن المجلد الأساسي الذي يحتوي على settings.gradle أو build.gradle
          TARGET_FILE=$(find . -name "settings.gradle.kts" -o -name "settings.gradle" -o -name "build.gradle.kts" -o -name "build.gradle" | head -n 1)
          
          if [ -z "$TARGET_FILE" ]; then
            echo "❌ لم يتم العثور على أي ملفات إعداد Gradle في الكود!"
            exit 1
          fi
          
          PROJECT_ROOT=$(dirname "$TARGET_FILE")
          cd "$PROJECT_ROOT"
          echo "📍 مجلد العمل الحالي: $(pwd)"

          # 2. التأكد من وجود gradlew أو توليده تلقائياً من البيئة
          if [ ! -f "./gradlew" ]; then
            echo "⚙️ ملف gradlew غير موجود.. جاري توليده تلقائياً باستخدام النظام..."
            gradle wrapper
          fi

          # 3. منح تصاريح التنفيذ الكاملة
          chmod +x gradlew

          # 4. بدء الكومبايل
          echo "🚀 بدء عملية بناء الـ APK..."
          ./gradlew assembleDebug --no-daemon

      - name: 5. رفع ملف الـ APK النهائي للتحميل من GitHub
        uses: actions/upload-artifact@v4
        with:
          name: SmartCashier-Offline-Debug
          path: '**/build/outputs/apk/debug/*.apk'
