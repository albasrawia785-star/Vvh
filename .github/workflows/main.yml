name: Build Offline Android Debug APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. جلب كود المشروع من مستودع GitHub
        uses: actions/checkout@v4

      - name: 2. إعداد بيئة Java Development Kit (JDK 17)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: 3. إعطاء تصاريح التشغيل لأمر Gradle Wrapper
        run: |
          find . -name "gradlew" -exec chmod +x {} \;

      - name: 4. إلغاء/تخطي فحص google-services.json تلقائياً
        run: |
          echo "إنشاء ملف وهمي لتجنب أخطاء حزم Google المتخلفة في المشروع..."
          find . -type d -name "app" | while read app_dir; do
            cat <<EOF > "$app_dir/google-services.json"
          {
            "project_info": { "project_number": "000000000000", "project_id": "offline-app" },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000000",
                  "android_client_info": { "package_name": "com.aistudio.smartcashierpos.offlinepos" }
                }
              }
            ]
          }
          EOF
          done

      - name: 5. بدء بناء نسخة الـ APK (assembleDebug)
        run: |
          # العثور على المجلد الذي يحتوي على settings.gradle.kts أو settings.gradle وتشغيل البناء داخله
          TARGET_DIR=$(find . -maxdepth 3 \( -name "settings.gradle.kts" -o -name "settings.gradle" \) -exec dirname {} \; | head -n 1)
          cd "$TARGET_DIR"
          ./gradlew assembleDebug --no-daemon

      - name: 6. رفع ملف الـ APK النهائي للتحميل من GitHub
        uses: actions/upload-artifact@v4
        with:
          name: SmartCashier-Offline-Debug
          path: '**/build/outputs/apk/debug/*.apk'
