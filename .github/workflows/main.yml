name: Build Offline Android Debug APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. جلب المستودع من GitHub
        uses: actions/checkout@v4

      - name: 2. إعداد بيئة Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 3. فك ضغط ملف g.zip تلقائياً
        run: |
          if [ -f "g.zip" ]; then
            echo "📦 تم العثور على g.zip، جاري فك الضغط..."
            unzip -o g.zip -d extracted_project
          else
            echo "⚠️ لم يتم العثور على g.zip في جذر المستودع!"
          fi

      - name: 4. تحديد المجلد وإنشاء الملفات المطلوبة للتوقيع وغوغل
        run: |
          TARGET_FILE=$(find . \( -name "settings.gradle.kts" -o -name "settings.gradle" -o -name "build.gradle.kts" -o -name "build.gradle" \) -not -path "*/build/*" | head -n 1)
          
          if [ -z "$TARGET_FILE" ]; then
            echo "❌ لم يتم العثور على ملفات المشروع بعد فك الضغط!"
            exit 1
          fi
          
          PROJECT_ROOT=$(dirname "$TARGET_FILE")
          cd "$PROJECT_ROOT"
          echo "📍 مجلد المشروع الحالي: $(pwd)"

          # 🔑 توليد ملف debug.keystore افتراضي لتوقيع التطبيق
          echo "🔑 جاري توليد ملف debug.keystore المطلوبة للبناء..."
          keytool -genkey -v -keystore debug.keystore \
            -storepass android -alias androiddebugkey -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

          # ⚙️ إنشاء ملف google-services.json وهمي مكتمل
          echo "⚙️ إنشاء ملف google-services.json وهمي..."
          find . -type d -name "app" | while read app_dir; do
            cat <<EOF > "$app_dir/google-services.json"
          {
            "project_info": {
              "project_number": "123456789012",
              "project_id": "offline-pos-app",
              "storage_bucket": "offline-pos-app.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:123456789012:android:1234567890123456",
                  "android_client_info": {
                    "package_name": "com.aistudio.smartcashierpos.offlinepos"
                  }
                },
                "oauth_client": [],
                "api_key": [
                  {
                    "current_key": "mock_api_key_for_offline_build_purposes"
                  }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": []
                  }
                }
              }
            ],
            "configuration_version": "1"
          }
          EOF
          done

          # إنشاء gradlew إذا لم يكن موجوداً
          if [ ! -f "./gradlew" ]; then
            echo "⚙️ جاري إنشاء gradlew..."
            gradle wrapper
          fi

          chmod +x gradlew
          echo "🚀 بدء البناء والكومبايل النهائي..."
          ./gradlew assembleDebug --no-daemon

      - name: 5. رفع ملف الـ APK النهائي للتحميل
        uses: actions/upload-artifact@v4
        with:
          name: SmartCashier-Offline-Debug
          path: '**/build/outputs/apk/debug/*.apk'
